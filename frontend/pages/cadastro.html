<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet" href="../css/cadastro.css">
</head>

<body>

    <main class="container">

        <section class="signup-area">

            <form class="form-area">

                <h2>Comece Agora Mesmo</h2>

                <p id="frase">
                    Planeje eventos, gerencie convidados e torne cada ocasião especial.
                </p>

                <label for="nome">Nome</label>
                <input type="text" id="nome" placeholder="João Silva">

                <label for="email">Email</label>
                <input type="email" id="email" placeholder="joao@gmail.com">

                <label for="senha">Senha</label>
                <input type="password" id="senha" placeholder="Ao menos 8 caracteres">

                <label for="confirmarSenha">Confirmar senha</label>
                <input type="password" id="confirmarSenha" placeholder="Repita sua senha">

                <button id="btnCadastrar">Criar conta</button>

                <div class="ou">──────── Ou ────────</div>

                <div class="social-buttons">

                    <button id="btnLoginGoogle">
                        <img src="../img/googlelogo.png" alt="Google">
                        Google
                    </button>

                    <button id="btnLoginEmail">
                        Email
                    </button>

                </div>

                <p>
                    Já possui conta?
                    <a href="../index.html">Entrar</a>
                </p>

            </form>

        </section>

        <section class="imagem">
            <img id="imagemA" src="../img/cadastro.jpg">
        </section>

    </main>
    <script src="../js/telaCadastro.js"></script>
</body>
</html>
