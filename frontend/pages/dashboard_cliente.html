<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Agenda – Agendador de Eventos</title> 
  <link rel="stylesheet" href="../css/dashboard_cliente.css" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
</head>
<body>
<div class="app">

  <aside class="sidebar"></aside>

  <div class="main">
    
    <div class="topbar">

      <div class="topbar-left">
        <div class="filtros">
          <select>
            <option>Dia</option>
            <option>Tarde</option>
            <option>Noite</option>
          </select>
          <select>
            <option>Empresa</option>
          </select>
          <select>
            <option>Seção</option>
          </select>
        </div>

        <div class="date-nav">
          <button class="nav-btn"><i class="fa-solid fa-chevron-left"></i></button>
          <button class="today-btn">Today</button>
          <div class="date-label">Tuesday 27 Aug, 2022</div>
          <button class="nav-btn"><i class="fa-solid fa-chevron-right"></i></button>
        </div>
      </div>

      <button class="btn-add">+ Evento</button>

  </div>

    <div class="agenda-container">
      <div class="agenda">

        <!-- EXEMPLO DE UMA LINHA -->
        <div class="hora">06:00</div>
        <div class="celula"></div>
        <div class="celula"></div>
        <div class="celula"></div>
        <div class="celula"></div>
        <div class="celula"></div>

      </div>
    </div>

  </div>
</div>

</body>
</html>
