<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EventHub — Explorar Eventos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/dashboard_cliente.css" />
    <link rel="stylesheet" href="../css/explorar_eventos.css" />
  </head>
  <body>
    <aside class="sidebar">
      <div class="sidebar-logo">
        <div class="sidebar-logo-icone">
          <svg
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="#fff"
            stroke-width="2.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <rect x="3" y="4" width="18" height="18" rx="2" />
            <line x1="16" y1="2" x2="16" y2="6" />
            <line x1="8" y1="2" x2="8" y2="6" />
            <line x1="3" y1="10" x2="21" y2="10" />
          </svg>
        </div>
        EventHub
        <span class="sidebar-badge">Cliente</span>
      </div>

      <nav class="sidebar-nav">
        <a href="dashboard_cliente.html" class="sidebar-nav-item">
          <svg
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <rect x="3" y="3" width="7" height="7" />
            <rect x="14" y="3" width="7" height="7" />
            <rect x="14" y="14" width="7" height="7" />
            <rect x="3" y="14" width="7" height="7" />
          </svg>
          Início
        </a>
        <a href="explorar_eventos.html" class="sidebar-nav-item ativo">
          <svg
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle cx="11" cy="11" r="8" />
            <line x1="21" y1="21" x2="16.65" y2="16.65" />
          </svg>
          Explorar Eventos
        </a>

        <div class="sidebar-divisor"></div>

        <a href="#" class="sidebar-nav-item sair" id="btnLogout">
          <svg
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
            <polyline points="16 17 21 12 16 7" />
            <line x1="21" y1="12" x2="9" y2="12" />
          </svg>
          Sair
        </a>
      </nav>

      <div class="sidebar-usuario">
        <div class="sidebar-usuario-avatar" id="avatarIniciais">JD</div>
        <div class="sidebar-usuario-info">
          <span class="sidebar-usuario-nome" id="nomeUsuario">Usuário</span>
          <span class="sidebar-usuario-cargo" id="emailUsuario"
            >cliente@email.com</span
          >
        </div>
      </div>
    </aside>

    <div class="main-wrapper">
      <header class="dashboard-topbar">
        <div class="dashboard-search">
          <svg
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle cx="11" cy="11" r="8" />
            <line x1="21" y1="21" x2="16.65" y2="16.65" />
          </svg>
          <input
            type="text"
            id="campoBusca"
            placeholder="Buscar eventos por nome..."
          />
        </div>
        <div class="dashboard-topbar-acoes">
          <select id="filtroStatus" class="filtro-select">
            <option value="">Todos os status</option>
            <option value="Confirmado">Confirmado</option>
            <option value="Pendente">Pendente</option>
          </select>
        </div>
      </header>

      <main class="dashboard-main">
        <div class="pagina-cabecalho">
          <h1>Explorar Eventos</h1>
          <p>Confira todos os eventos disponíveis na plataforma</p>
        </div>

        <div class="eventos-grid" id="listaEventos">
          <div class="estado-carregando" id="estadoCarregando">
            <div class="spinner"></div>
            <p>Carregando eventos...</p>
          </div>
        </div>

        <div class="estado-vazio" id="estadoVazio" style="display: none">
          <svg
            width="48"
            height="48"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle cx="11" cy="11" r="8" />
            <line x1="21" y1="21" x2="16.65" y2="16.65" />
          </svg>
          <p>Nenhum evento encontrado</p>
        </div>
      </main>
    </div>

    <script src="../js/explorar_eventos.js"></script>
  </body>
</html>
