<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet" href="css/cadastro.css">
</head>
<body>

    <div class="container">

        <div class="topo">
            <img src="img/calendario.png">
            <h2>Criar Conta</h2>
            <p>Preencha os dados para se cadastrar</p>
        </div>

        <form class="form-cadastro">

            <div class="campo">
                <label for="name">Nome Completo</label>
                <input type="text" id="name" name="name" placeholder="Ex: João Silva">
            </div>

            <div class="campo">
                <label for="email">Email</label>
                <input type="text" id="email" name="email" placeholder="Ex: joao.silva@email.com">
            </div>

            <div class="campo">
                <label for="senha">Senha</label>
                <input type="password" id="senha" name="senha" placeholder="Mínimo 6 caracteres">
            </div>

            <div class="campo">
                <label for="confirm_senha">Confirmar Senha</label>
                <input type="password" id="confirm_senha" name="confirm_senha" placeholder="Confirme sua senha">
            </div>

            <div class="opcao-tipo">
                <p>Tipo de usuário:</p>
                <label>
                    <input type="radio" name="tipo" value="cliente">
                    Cliente (Solicita os agendamentos)
                </label>

                <label>
                    <input type="radio" name="tipo" value="gestor">
                    Gestor (Realiza os agendamentos e gerencia os clientes)
                </label>
            </div>

            <div class="botao-cadastrar">
                <button type="submit" class="btn">Cadastrar</button>
            </div>
            
            <div class="login-link">
                <p class="login-text">
                    Já tem uma conta? <a href="login.html">Fazer login</a>
                </p>
            </div>

        </form>
    </div>

</body>
</html>
