<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <main class="container">

        <section class="login-area">

            <form class="form-area">

                <h2>Seu próximo grande evento começa aqui!</h2>
                <p id="frase"></p>

                <label for="email">Email</label>
                <input type="email" id="email" placeholder="joao@gmail.com">

                <label for="senha">Senha</label>
                <input type="password" id="senha" placeholder="Ao menos 8 caracteres">

                <a href="#" class="forgot-password">Esqueceu sua senha?</a>

                <button id="btnEntrar">Entrar</button>

                <div class="ou">──────── Ou ────────</div>
                
                <div class="social-buttons">
                    <button id="btnLoginGoogle">
                        <img src="img/googlelogo.png" alt="Google">
                        Google
                    </button>
                    <button id="btnLoginEmail">Email</button>
                </div>

                <p>
                    Não tem conta?
                    <a href="pages/cadastro.html">Cadastre-se</a>
                </p>

            </form>

        </section>

        <section class="imagem">
            <img id="imagemAleatoria" src="img/login.jpg">
        </section>
    </main>

    <script src="js/telaLogin.js"></script>
</body>
</html>
